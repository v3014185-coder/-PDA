<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA Interface - СОБ</title>
    <style>
        /* Базовые цвета PDA (Стиль милитари/сталкер) */
        body {
            background-color: #1a1c1a; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* УВЕЛИЧЕННЫЙ КОРПУС PDA */
        .pda-screen {
            width: 100%;
            max-width: 800px; 
            min-height: 750px; 
            background-color: #0d0f0d;
            border: 5px solid #3a413a;
            border-radius: 15px;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.15), 0 0 25px rgba(0,0,0,0.7);
            padding: 40px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Эффект сетки экрана */
        .pda-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            border-radius: 10px;
        }

        /* УВЕЛИЧЕННЫЕ И МОЩНЫЕ КНОПКИ */
        .pda-btn {
            background-color: #1b261b;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 20px 40px; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            transition: all 0.2s ease;
            width: 100%; 
            max-width: 400px;
        }

        .pda-btn:hover {
            background-color: #39ff14;
            color: #0d0f0d;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
        }

        /* Скрытые элементы */
        .hidden {
            display: none !important;
        }

        /* УВЕЛИЧЕННЫЙ КОНТЕЙНЕР МЕНЮ */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            height: 100%;
            animation: terminalBoot 0.4s ease-out; 
        }

        .menu-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px dashed #39ff14;
            padding-bottom: 15px;
            letter-spacing: 2px;
        }

        /* БЛОК ДЛЯ ТЕКСТА (ЭКРАН ВНУТРИ КПК) */
        .pda-text-display {
            background-color: #080a08;
            border: 1px solid #224422;
            padding: 20px;
            border-radius: 5px;
            height: 350px; 
            overflow-y: auto; 
            font-size: 16px;
            line-height: 1.6;
            color: #a3ff8d; 
            margin-bottom: 15px;
            position: relative;
        }

        /* Каретка бегущей строки */
        .pda-text-display::after {
            content: '_';
            animation: blink 0.8s infinite;
        }

        /* Сетка кнопок управления */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            width: 100%;
        }

        /* Анимация включения экрана */
        @keyframes terminalBoot {
            0% { opacity: 0; transform: scaleY(0.01) scaleX(0); filter: brightness(3); }
            50% { opacity: 0.8; transform: scaleY(1) scaleX(0.02); }
            100% { opacity: 1; transform: scaleY(1) scaleX(1); filter: brightness(1); }
        }

        /* Анимация мигания курсора */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="pda-screen">
        
        <!-- Стартовый экран -->
        <div id="start-screen">
            <button class="pda-btn" style="font-size: 22px; padding: 25px 50px;" onclick="activatePDA()">ОТКРЫТЬ КПК</button>
        </div>

        <!-- Большое меню -->
        <div id="main-menu" class="menu-container hidden">
            <div class="menu-title">-- БОРТОВОЙ КПК: СЕТЬ АКТИВНА --</div>
            
            <!-- Окно для вывода информации -->
            <div id="text-display" class="pda-text-display"></div>

            <!-- Сетка из 4 кнопок -->
            <div class="buttons-grid">
                <button class="pda-btn" style="max-width: 100%;" onclick="showText('кодекс')">1. Кодекс</button>
                <button class="pda-btn" style="max-width: 100%;" onclick="showText('лор')">2. Лор СОБ</button>
                <button class="pda-btn" style="max-width: 100%;" onclick="showText('структура')">3. Структура</button>
                <button class="pda-btn" style="max-width: 100%;" onclick="showText('документация')">4. Документация</button>
            </div>
        </div>

    </div>

    <script>
        let typingTimer; 

        const welcomeText = `[ СИСТЕМНОЕ УВЕДОМЛЕНИЕ ]\n--------------------------------------------------\nИнициализация ядра интерфейса... ОК\nПроверка биометрических маркеров владельца... ДОСТУП РАЗРЕШЕН\nТекущий статус локальной сети: СТАТИЧЕСКИЙ ЗАШИФРОВАННЫЙ СЕКТОР\nСинхронизация с серверами Специального Отряда Безопасности завершена.\n\n[ВНИМАНИЕ]: Обнаружен зашифрованный массив данных СОБ. Выберите интересующий сектор информации ниже для дешифровки данных на экран.`;

        function activatePDA() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            typeWriter(welcomeText); 
        }

        function typeWriter(text) {
            clearInterval(typingTimer);
            const display = document.getElementById('text-display');
            display.innerHTML = '';
            
            let i = 0;
            let tokens = [];
            let current = 0;
            while (current < text.length) {
                if (text.substr(current, 1) === '\n') {
                    tokens.push('<br>');
                    current++;
                } else {
                    tokens.push(text.substr(current, 1));
                    current++;
                }
            }

            typingTimer = setInterval(() => {
                if (i < tokens.length) {
                    display.innerHTML += tokens[i];
                    i++;
                    display.scrollTop = display.scrollHeight; 
                } else {
                    clearInterval(typingTimer);
                }
            }, 8); 
        }

        function showText(section) {
            let targetText = '';
            
            if (section === 'кодекс') {
                targetText = `[ РАЗДЕЛ I: КОДЕКС ПОВЕДЕНИЯ И УСТАВ С.О.Б. ]\n==================================================\n\nОсновные правила\n______________________________\n1.1. Запрещено мошенничество. Любой обман, подлог, фальсификация отчетов или документов с целью получения выгоды.\n\n1.2. Запрещена подмена своего звания на другое. Присвоение более высокого звания или выдача себя за старшего по званию.\n\n1.3. Запрещено повышение или понижение в звании без весомой причины. Изменение звания проводится только командиром на основании заслуг или нарушений.\n\n2.1. Запрещено ослушиваться старших по званию в С.О.Б. Приказы командира и старших бойцов твоего отдела выполняются беспрекословно.\n(Исключение: если старший по званию не находится в твоём отделе или не является прямым командиром твоей группы, ты имеешь право не подчиняться его приказам. Но при этом самому главному командиру С.О.Б. подчиняться обязательно всегда.)\n\n2.2. Неприкосновенность Личности: Запрещены обыски и изъятие личных вещей без веских оснований.\n\n3.1. Запрещена выдача себя за другого бойца С.О.Б., члена сопротивления, пленного или Альянс. Подмена личности с целью получения выгоды, обмана или шпионажа.\n\n3.2. Запрещена отдача приказа, в случае выполнения которого боец нарушит устав. Командир или старший не имеют права давать приказы, заведомо нарушающие кодекс С.О.Б. За такие приказы виновный несёт ответственность наравне с исполнителем.\n\n3.3. Запрещено воровство у членов сопротивления или пленных. Кража личных вещей, еды, оружия или припасов у своих или у захваченных пленных расценивается как мародерство.\n\n3.4. Запрещено нанесение ущерба здоровью членов сопротивления или пленных. Любое физическое воздействие, не связанное с необходимостью обезвредить опасную личность.\n\n3.5. Запрещено раскрытие тайн С.О.Б. Любая информация о численности, вооружении, планах и местонахождении группы не разглашается посторонним.\n\n3.6. Запрещено бросать своих раненых на поле боя. Если член С.О.Б. получил ранение, отряд обязан эвакуировать его или прикрывать до последнего, пока есть шанс. Оставление своего считается предательством.\n\n3.7. Никаких личных разборок внутри отряда. Конфликты решает командир или общее голосование. Драки и угрозы оружием среди своих - тяжкое нарушение.\n\n3.8. Запрещено заниматься криминальной деятельностью (Строго запрещено заниматься грабежом, мародерством, вымогательством и убийством невиновных).`;
                
            } else if (section === 'лор') {
