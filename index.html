<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA Interface - СОБ</title>
    <style>
        /* Базовые цвета PDA (Стиль милитари/сталкер) */
        body {
            background-color: #1a1c1a; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        /* КОРПУС PDA */
        .pda-screen {
            width: 100%;
            max-width: 800px; 
            min-height: 750px; 
            background-color: #0d0f0d;
            border: 5px solid #3a413a;
            border-radius: 15px;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.15), 0 0 25px rgba(0,0,0,0.7);
            padding: 40px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Эффект сетки старого ЭЛТ-монитора и бегущей строки сканирования */
        .pda-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            border-radius: 10px;
        }

        /* Медленная полоса сканирования сверху вниз */
        .scanline {
            position: absolute;
            top: -100px;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, rgba(57,255,20,0), rgba(57,255,20,0.06), rgba(57,255,20,0));
            animation: scan 6s linear infinite;
            z-index: 4;
            pointer-events: none;
        }

        /* СТИЛИ КНОПОК */
        .pda-btn {
            background-color: #1b261b;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 20px 40px; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            transition: all 0.2s ease;
            width: 100%; 
            max-width: 400px;
            margin: 10px 0;
            position: relative;
        }

        .pda-btn:hover {
            background-color: #39ff14;
            color: #0d0f0d;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
        }

        .hidden { 
            display: none !important; 
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            height: 100%;
        }

        .menu-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px dashed #39ff14;
            padding-bottom: 15px;
            letter-spacing: 2px;
        }

        /* ТЕКСТОВЫЙ ЭКРАН */
        .pda-text-display {
            background-color: #080a08;
            border: 1px solid #224422;
            padding: 20px;
            border-radius: 5px;
            height: 350px; 
            overflow-y: auto; 
            font-size: 16px;
            line-height: 1.6;
            color: #a3ff8d; 
            margin-bottom: 15px;
            white-space: pre-wrap; 
            word-wrap: break-word;
            position: relative;
            transition: opacity 0.15s ease;
        }

        /* КЛАСС ДЛЯ ЭФФЕКТА ПОМЕХ (включается через JS) */
        .glitch-active {
            animation: glitchEffect 0.25s infinite;
            filter: hue-rotate(90deg) saturate(2);
            opacity: 0.8;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            width: 100%;
        }

        /* АНИМАЦИИ ПОМЕХ И ШУМА */
        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        @keyframes glitchEffect {
            0% {
                transform: translate(0);
                clip-path: inset(10% 0 30% 0);
            }
            20% {
                transform: translate(-3px, 2px);
                clip-path: inset(45% 0 10% 0);
            }
            40% {
                transform: translate(3px, -2px);
                clip-path: inset(80% 0 5% 0);
            }
            60% {
                transform: translate(-2px, -3px);
                clip-path: inset(5% 0 70% 0);
            }
            80% {
                transform: translate(2px, 3px);
                clip-path: inset(30% 0 40% 0);
            }
            100% {
                transform: translate(0);
                clip-path: inset(0);
            }
        }
    </style>
</head>
<body>

    <div class="pda-screen">
        <!-- Бегущая полоса шума сети -->
        <div class="scanline"></div>

        <!-- Стартовый экран -->
        <div id="start-screen">
            <button class="pda-btn" style="font-size: 22px; padding: 25px 50px;" onclick="activatePDA()">ОТКРЫТЬ КПК</button>
        </div>

        <!-- Внутреннее меню -->
        <div id="main-menu" class="menu-container hidden">
            <div class="menu-title">-- БОРТОВОЙ КПК: СЕТЬ АКТИВНА --</div>
            
            <!-- Окно вывода с поддержкой анимации шума -->
            <div id="text-display" class="pda-text-display"></div>
            
            <div class="buttons-grid">
                <button class="pda-btn" onclick="triggerGlitch('кодекс')">1. Кодекс</button>
                <button class="pda-btn" onclick="triggerGlitch('лор')">2. Лор СОБ</button>
                <button class="pda-btn" onclick="triggerGlitch('структура')">3. Структура</button>
                <button class="pda-btn" onclick="triggerGlitch('документация')">4. Документация</button>
            </div>
        </div>
    </div>
