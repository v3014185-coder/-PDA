<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA Interface - СОБ</title>
    <style>
        body {
            background-color: #1a1c1a; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .pda-screen {
            width: 100%;
            max-width: 800px; 
            min-height: 750px; 
            background-color: #0d0f0d;
            border: 5px solid #3a413a;
            border-radius: 15px;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.15), 0 0 25px rgba(0,0,0,0.7);
            padding: 40px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .pda-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            border-radius: 10px;
        }
        .scanline {
            position: absolute;
            top: -100px;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, rgba(57,255,20,0), rgba(57,255,20,0.05), rgba(57,255,20,0));
            animation: scan 6s linear infinite;
            z-index: 4;
            pointer-events: none;
        }
        .pda-btn {
            background-color: #1b261b;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 20px 40px; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            transition: all 0.2s ease;
            width: 100%; 
            max-width: 400px;
            margin: 10px 0;
        }
        .pda-btn:hover {
            background-color: #39ff14;
            color: #0d0f0d;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
        }
        .hidden { 
            display: none !important; 
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            height: 100%;
        }
        .menu-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px dashed #39ff14;
            padding-bottom: 15px;
            letter-spacing: 2px;
        }
        .pda-text-display {
            background-color: #080a08;
            border: 1px solid #224422;
            padding: 20px;
            border-radius: 5px;
            height: 350px; 
            overflow-y: auto; 
            font-size: 16px;
            line-height: 1.6;
            color: #a3ff8d; 
            margin-bottom: 15px;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        .pda-text-display::-webkit-scrollbar {
            width: 8px;
        }
        .pda-text-display::-webkit-scrollbar-track {
            background: #040604; 
            border-radius: 5px;
        }

            border: 1px
