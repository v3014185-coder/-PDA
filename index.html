<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA Interface</title>
    <style>
        /* Базовые цвета PDA (Стиль милитари/сталкер) */
        body {
            background-color: #1a1c1a; /* Темный хаки/серый */
            color: #39ff14; /* Неоновый зеленый код */
            font-family: 'Courier New', Courier, monospace; /* Моноширинный шрифт */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Корпус PDA на экране */
        .pda-screen {
            width: 90%;
            max-width: 400px;
            height: 600px;
            background-color: #0d0f0d;
            border: 4px solid #3a413a;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.2), 0 0 15px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Эффект сетки старого экрана */
        .pda-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Стили кнопок */
        .pda-btn {
            background-color: #1b261b;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
            transition: all 0.2s ease;
        }

        .pda-btn:hover {
            background-color: #39ff14;
            color: #0d0f0d;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
        }

        /* Скрытые элементы */
        .hidden {
            display: none !important;
        }

        /* Стили для меню, которое откроется */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .menu-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 1px dashed #39ff14;
            padding-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="pda-screen">
        
        <!-- Стартовый экран с кнопкой Активировать -->
        <div id="start-screen">
            <button class="pda-btn" onclick="activatePDA()">Активировать</button>
        </div>

        <!-- Второе меню (изначально скрыто) -->
        <div id="main-menu" class="menu-container hidden">
            <div class="menu-title">[ СИСТЕМА АКТИВИРОВАНА ]</div>
            
            <!-- Сюда мы потом вставим ваш большой текст -->
            <button class="pda-btn">Данные сети</button>
            <button class="pda-btn">Карта КПК</button>
            <button class="pda-btn">Сообщения</button>
        </div>

    </div>

    <script>
        // Функция переключения экранов при нажатии
        function activatePDA() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }
    </script>

</body>
</html>
