<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA Interface - СОБ</title>
    <style>
        body {
            background-color: #1a1c1a; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .pda-screen {
            width: 100%;
            max-width: 800px; 
            min-height: 750px; 
            background-color: #0d0f0d;
            border: 5px solid #3a413a;
            border-radius: 15px;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.15), 0 0 25px rgba(0,0,0,0.7);
            padding: 40px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .pda-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            border-radius: 10px;
        }
        .scanline {
            position: absolute;
            top: -100px;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, rgba(57,255,20,0), rgba(57,255,20,0.05), rgba(57,255,20,0));
            animation: scan 6s linear infinite;
            z-index: 4;
            pointer-events: none;
        }
        .pda-btn {
            background-color: #1b261b;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 20px 40px; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            transition: all 0.2s ease;
            width: 100%; 
            max-width: 400px;
            margin: 10px 0;
        }
        .pda-btn:hover {
            background-color: #39ff14;
            color: #0d0f0d;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
        }
        .pda-link {
            color: #39ff14;
            text-decoration: underline;
            font-weight: bold;
        }
        .pda-link:hover {
            color: #fff;
        }
        .hidden { 
            display: none !important; 
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            height: 100%;
        }
        .menu-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px dashed #39ff14;
            padding-bottom: 15px;
            letter-spacing: 2px;
        }
        .pda-text-display {
            background-color: #080a08;
            border: 1px solid #224422;
            padding: 20px;
            border-radius: 5px;
            height: 350px; 
            overflow-y: auto; 
            font-size: 16px;
            line-height: 1.6;
            color: #a3ff8d; 
            margin-bottom: 15px;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        .pda-text-display::-webkit-scrollbar {
            width: 8px;
        }
        .pda-text-display::-webkit-scrollbar-track {
            background: #040604; 
            border-radius: 5px;
        }
        .pda-text-display::-webkit-scrollbar-thumb {
            background: #1b4d1b; 
            border: 1px solid #39ff14; 
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }
        .pda-text-display::-webkit-scrollbar-thumb:hover {
            background: #39ff14; 
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.8);
        }
        .glitch {
            animation: glitchAni 0.15s steps(2) infinite;
        }
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            width: 100%;
        }
        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }
        @keyframes glitchAni {
            0% { transform: translate(1px, -1px); filter: brightness(1.3); }
            50% { transform: translate(-1px, 1px); filter: brightness(0.9); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div class="pda-screen">
        <div class="scanline"></div>

        <!-- Стартовый экран -->
        <div id="start-screen">
            <button class="pda-btn" style="font-size: 22px; padding: 25px 50px;" onclick="openPDA()">ОТКРЫТЬ КПК</button>
        </div>

        <!-- Главное меню -->
        <div id="main-menu" class="menu-container hidden">
            <div class="menu-title">-- БОРТОВОЙ КПК: СЕТЬ АКТИВНА --</div>
            <div id="text-display" class="pda-text-display"></div>
            <div class="buttons-grid">
                <button class="pda-btn" onclick="changeSection('кодекс')">1. Кодекс</button>
                <button class="pda-btn" onclick="changeSection('лор')">2. Лор СОБ</button>
                <button class="pda-btn" onclick="changeSection('структура')">3. Структура</button>
                <button class="pda-btn" onclick="changeSection('документация')">4. Документация</button>
            </div>
        </div>
    </div>

    <script>
        const dataLog = {
            welcome: `[ СИСТЕМНОЕ УВЕДОМЛЕНИЕ ]\n--------------------------------------------------\nИнициализация ядра... ОК\nБиометрия... ДОСТУП РАЗРЕШЕН\n\n[ВНИМАНИЕ]: Обнаружен зашифрованный массив данных СОБ. Выберите интересующий сектор информации ниже.`,
            
            кодекс: `Кодекс СОБ, в нём собраны все правила и тп.\n\nКодекс:\n<a class="pda-link" href="https://docs.google.com/document/d/1FQvL_VXoTB6I206y6DP4sJz70BmbTZ6UP8FFSbHzz28/edit?usp=sharing" target="_blank">Найти Кодекс</a>`,
            
            лор: `[ РАЗДЕЛ II: ИСТОРИЯ И ЛОР ФРАКЦИИ СОБ ]\n==================================================\n\n# 🛠️ СОЮЗ ОБЪЕДИНЕННЫХ БОЙЦОВ (СОБ)

### 📖 История группировки

**Как всё начиналось**
В подземельях и секторах за чертой города всегда творился полный бардак. Пока патрули держали людей в страхе за стенами, внизу беженцы и мелкие банды просто резали друг друга за банку тушенки или пачку патронов. Никакого общего фронта не было — все воевали со всеми, процветало мародерство, а обычные гражданские, сбежавшие от облав, гибли в первые же дни.
.\n\nАйрал Пилотов, которого в каналах все знали по позывному **«Якут»**, понял, что с таким подходом выжить не получится. Он начал собирать вокруг себя нормальных, соображающих парней: рукастых техников, толковых медиков и тех, кто умел держать в руках автомат, но не хотел опускаться до банального разбоя. Так и появился **Союз Объединенных Бойцов (СОБ)**. Главной задачей отряда стало наведение порядка и защита тех, кто сам постоять за себя не может.

**Первая база и разгром**
Поначалу СОБ закрепился на старой базе нейтралов. Парни быстро навели там шороху: выбили бандитов из ближайших тоннелей, поставили свои посты и ввели жесткий запрет на стрельбу по своим. Техники восстановили свет и укрепили проходы, медики начали лечить раненых, а патрули делились едой и медикаментами с прибывающими беженцами. 

Но долго это не продлилось. Во время вылазки на ракетный комплекс отряд угодил в засаду и потерпел серьезное поражение. Потеряв людей и снаряжение, Якут понял, что оставаться на старом месте нельзя — это подставит под удар мирных, да и позиции сдали. Было решено уходить глубже в каналы, чтобы перегруппироваться.

**Руины бара «Восток» и потеря Аванпоста**
Новым домом для СОБа стали полуразрушенные помещения старого бара **«Восток»**. Место глухое, скрытое от чужих глаз, но крепкое. Парни забаррикадировали лишние входы и наладили быт.

Однако сидеть только под землей было нельзя. Прямо на окраине Мертвой Зоны, в руинах заброшенных технических помещений, общими усилиями был воздвигнут укрепленный **Нейтральный Аванпост**. Всю территорию обнесли прочным забором с кучей огневых точек, а внутри обустроили медпункт и бар. Это место защищали бойцы из **ВС**, **японцы**, **ХЕКС** и **нейтралы**, превратив его в надежное укрытие для всех сопротивленцев.

Но такая идея понравилась далеко не всем. Появление новой укрепленной организации и постоянная активность на аванпосте сильно мешали **Костоправам**, у которых через эти сектора проходили свои важные торговые пути. Они были крайне недовольны активностью Альянса, которую привлек аванпост. В итоге Костоправы просто пришли и прогнали всех из аванпоста.

Оставив потерянный блокпост позади, СОБ вернулся в бар «Восток». Задачи отряда не изменились — парни всё так же держат порядок в подконтрольных секторах, пресекают бандитизм и помогают выжившим под землей. Но теперь СОБ активно набирает свежие силы, чтобы окрепнуть, вернуть утраченное влияние и заставить Костоправов считаться с собой.`,
            
            структура: `[ РАЗДЕЛ III: ИЕРАРХИЯ И СТРУКТУРА ОТРЯДА ]\n==================================================\n\n● БУНТАРЬ (Без лимита)\nНовички организации, которые только примкнули к отряду и проходят курс молодого бойца. Дежурят во внутренних помещениях базы.\n* Вооружение: P99, АК-74\n\n● ФЕЛЬДШЕР (Лимит: 4)\nУниверсальные бойцы поддержки. Латают раненых в полевом госпитале бара, заваривают поврежденные проходы и укрепляют оборону базы.\n* Вооружение: Аптечка, Сварка, P36, QBZ\n\n● ЛЕСНИК (Лимит: 3)\nСнайперы-одиночки. Работают на дальних дистанциях, караулят подходы к бару и ведут скрытную разведку на окраинах Мертвой Зоны.\n* Вооружение: Обрез ТОЗ-34, WA2000\n\n● ВЕТЕРАН (Лимит: 10)\nОсновная штурмовая и оборонительная сила СОБ. Костяк отряда. Держат оборону базы при штурмах и выходят на боевые патрули в каналы.\n* Вооружение: P36, АС-ВАЛ\n\n● ПРЕДВОДИТЕЛЬ (Лимит: 1)\nСам Айрал «Якут» Пилотов. Глава и основатель СОБ. Координирует действия отряда в подземельях и лично планирует будущие ответные шаги группировки.\n* Вооружение: P36, М249`,
            
            документация: `[ РАЗДЕЛ IV: СЕКРЕТНЫЕ АРХИВЫ И ДОКУМЕНТЫ ]\n==================================================\n\n[СТАТУС LOG-404]: Доступ Запрещён.\n\nДоступные сводки:\n- Протокол №12-А: Модернизация частотных фильтров.\n- Рапорт "Западный Рубеж": Отражение атаки на блокпост. Потерь n|a.`
        };

        function openPDA() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            const display = document.getElementById('text-display');
            display.classList.add('glitch');
            display.innerHTML = dataLog.welcome;
            setTimeout(() => { display.classList.remove('glitch'); }, 200);
        }

        function changeSection(key) {
            const display = document.getElementById('text-display');
            display.classList.add('glitch');
            setTimeout(() => {
                display.classList.remove('glitch');
                if (dataLog[key]) {
                    display.innerHTML = dataLog[key];
                    display.scrollTop = 0;
                }
            }, 200);
        }
    </script>
</body>
</html>
