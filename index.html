<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA Interface - Large</title>
    <style>
        /* Базовые цвета PDA (Стиль милитари/сталкер) */
        body {
            background-color: #1a1c1a; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* УВЕЛИЧЕННЫЙ КОРПУС PDA */
        .pda-screen {
            width: 100%;
            max-width: 800px; /* Сделали шире под большой текст */
            min-height: 750px; /* Сделали выше */
            background-color: #0d0f0d;
            border: 5px solid #3a413a;
            border-radius: 15px;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.15), 0 0 25px rgba(0,0,0,0.7);
            padding: 40px; /* Больше отступов внутри */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Эффект сетки экрана */
        .pda-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            border-radius: 10px;
        }

        /* УВЕЛИЧЕННЫЕ И МОЩНЫЕ КНОПКИ */
        .pda-btn {
            background-color: #1b261b;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 20px 40px; /* Кнопки стали массивнее */
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px; /* Шрифт крупнее */
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            transition: all 0.2s ease;
            width: 100%; /* Растягиваются по ширине контейнера */
            max-width: 400px;
        }

        .pda-btn:hover {
            background-color: #39ff14;
            color: #0d0f0d;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
        }

        /* Скрытые элементы */
        .hidden {
            display: none !important;
        }

        /* УВЕЛИЧЕННЫЙ КОНТЕЙНЕР МЕНЮ */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.5s ease;
        }

        .menu-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px dashed #39ff14;
            padding-bottom: 15px;
            letter-spacing: 2px;
        }

        /* БЛОК ДЛЯ ТЕКСТА (ЭКРАН ВНУТРИ КПК) */
        .pda-text-display {
            background-color: #080a08;
            border: 1px solid #224422;
            padding: 20px;
            border-radius: 5px;
            max-height: 300px; /* Чтобы текст не растягивал КПК до бесконечности */
            overflow-y: auto; /* Появится прокрутка, если текст огромный */
            font-size: 16px;
            line-height: 1.5;
            color: #a3ff8d; /* Чуть мягче зеленый для удобства чтения */
            margin-bottom: 15px;
        }

        /* Сетка кнопок управления */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Две кнопки в ряд */
            gap: 15px;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="pda-screen">
        
        <!-- Стартовый экран (Кнопка по центру) -->
        <div id="start-screen">
            <button class="pda-btn" style="font-size: 22px; padding: 25px 50px;" onclick="activatePDA()">ОТКРЫТЬ КПК</button>
        </div>

        <!-- Большое меню (Изначально скрыто) -->
        <div id="main-menu" class="menu-container hidden">
            <div class="menu-title">-- БОРТОВОЙ КПК: СЕТЬ АКТИВНА --</div>
            
            <!-- Окно для вывода вашего большого текста -->
            <div class="pda-text-display">
                <strong>[ СИСТЕМНОЕ УВЕДОМЛЕНИЕ ]</strong><br>
                Ожидание загрузки основного массива данных... Пожалуйста, отправьте ваш текст, чтобы наполнить этот терминал информацией.
            </div>

            <!-- Сетка больших кнопок -->
            <div class="buttons-grid">
                <button class="pda-btn" style="max-width: 100%;">Главные Данные</button>
                <button class="pda-btn" style="max-width: 100%;">Архив файлов</button>
                <button class="pda-btn" style="max-width: 100%;">Логи системы</button>
                <button class="pda-btn" style="max-width: 100%;">Журнал КПК</button>
            </div>
        </div>

    </div>

    <script>
        function activatePDA() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }
    </script>

</body>
</html>
